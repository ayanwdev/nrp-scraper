name: "Test"
on:
  pull_request:
  push:
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    - run: nix develop .#ci --command sh -c "python -m venv .venv"
    - run: nix develop .#ci --command sh -c "source .venv/bin/activate && poetry install"
    - run: nix develop .#ci --command sh -c "source .venv/bin/activate && poetry run pytest"